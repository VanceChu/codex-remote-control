name = "codex-remote-control"
main = "src/worker.ts"
compatibility_date = "2026-04-24"

[assets]
directory = "../pwa/dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RemoteControlRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RemoteControlRoom"]
